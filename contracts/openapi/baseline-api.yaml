# Questbook baseline 웹-앱 서버 HTTP API 계약이다.
openapi: 3.1.0
info:
  title: Questbook Daejeon Baseline API
  version: 0.1.0
  description: 사용자 PWA와 앱 API 사이의 baseline 계약이다.
servers:
  - url: http://127.0.0.1:8000
    description: 로컬 웹 게이트웨이
paths:
  /api/auth/providers:
    get:
      summary: 사용 가능한 로그인 provider와 설정 상태를 반환한다.
      responses:
        "200":
          description: provider 목록
  /api/auth/demo-login:
    post:
      summary: 로컬 baseline 검증용 demo-social 로그인과 필수 동의 기록을 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ageConfirmed, privacyConsent, locationConsent]
              properties:
                providerUserId:
                  type: string
                displayName:
                  type: string
                ageConfirmed:
                  type: boolean
                privacyConsent:
                  type: boolean
                locationConsent:
                  type: boolean
      responses:
        "200":
          description: Bearer access token과 사용자 동의 상태
  /api/health:
    get:
      summary: 앱 API와 DB 및 캐시 상태를 확인한다.
      responses:
        "200":
          description: 정상 상태
  /api/me:
    get:
      summary: 서버가 식별한 현재 사용자와 진행도를 반환한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 사용자 요약
  /api/recommendations:
    get:
      summary: 현재 위치와 카테고리 기준 추천 관광지와 퀘스트 후보를 반환한다.
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [all, nature, science, downtown, market, mobility, nightview]
        - name: radiusMeters
          in: query
          required: false
          schema:
            type: integer
            default: 5000
      responses:
        "200":
          description: 추천 결과. OpenAPI 원본 전체가 아니라 최소 장소 필드와 퀘스트 후보만 포함한다.
  /api/quests/{instanceId}/accept:
    post:
      summary: 추천 퀘스트를 수행하기로 선택한다.
      security:
        - bearerAuth: []
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 수락된 퀘스트 상태
  /api/quests/{instanceId}/complete:
    post:
      summary: GPS 기반 baseline 인증으로 퀘스트 완료를 요청한다.
      security:
        - bearerAuth: []
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [latitude, longitude]
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
                accuracyMeters:
                  type: number
                photoRef:
                  type: string
                  description: Object Storage에 업로드한 사진 증빙 객체 키
      responses:
        "200":
          description: 완료 성공 또는 재시도 가능한 인증 실패
  /api/badges:
    get:
      summary: 전체 뱃지와 사용자 진행 상태를 반환한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 뱃지 목록
  /api/notes:
    get:
      summary: 완료 퀘스트 기반 모험가의 수첩 기록을 반환한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 수첩 기록 목록
          content:
            application/json:
              schema:
                type: object
                required: [notes]
                properties:
                  notes:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdventureNote"
        "401":
          description: 인증이 필요함
  /api/notes/{noteId}:
    patch:
      summary: 현재 사용자의 수첩 기록에 일기 또는 리뷰 내용을 저장한다.
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entryType, title, body]
              additionalProperties: false
              properties:
                entryType:
                  type: string
                  enum: [diary, review]
                title:
                  type: string
                  maxLength: 100
                body:
                  type: string
                  minLength: 1
                  maxLength: 2000
                rating:
                  description: 리뷰 평점이며 일기에는 null 또는 생략 값을 사용한다.
                  anyOf:
                    - type: integer
                      minimum: 1
                      maximum: 5
                    - type: "null"
      responses:
        "200":
          description: 수정된 수첩 기록
          content:
            application/json:
              schema:
                type: object
                required: [note]
                properties:
                  note:
                    $ref: "#/components/schemas/AdventureNote"
        "400":
          description: 기록 유형, 제목, 본문 또는 평점이 유효하지 않음
        "401":
          description: 인증이 필요함
        "404":
          description: 현재 사용자가 소유한 수첩 기록을 찾을 수 없음
  /api/ggumdori:
    get:
      summary: 꿈돌이 도감과 사용자 해금 상태를 반환한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 꿈돌이 도감 상태
  /api/naver-map/config:
    get:
      summary: 브라우저에 공개 가능한 NAVER Maps 설정 상태만 반환한다.
      responses:
        "200":
          description: Key ID 설정 여부와 REST 프록시 활성 상태
  /api/object-storage/config:
    get:
      summary: 비밀값 없이 NCP Object Storage 설정 준비 상태를 반환한다.
      responses:
        "200":
          description: endpoint, region, bucket 설정 여부, presigned URL 정책
  /api/object-storage/upload-url:
    post:
      summary: 사진 증빙 업로드용 Object Storage presigned PUT URL을 발급한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [purpose, contentType]
              properties:
                purpose:
                  type: string
                  enum: [quest_receipt, quest_photo, user_auth_photo]
                contentType:
                  type: string
                  enum: [image/jpeg, image/png, image/webp, image/heic, image/heif]
                questInstanceId:
                  type: string
                  description: quest_receipt와 quest_photo 목적일 때 필수
      responses:
        "200":
          description: 브라우저가 PUT으로 직접 업로드할 URL, headers, objectKey
        "503":
          description: Object Storage 환경 변수가 아직 설정되지 않음
  /api/object-storage/download-url:
    post:
      summary: 본인 사진 증빙 조회용 Object Storage presigned GET을 발급한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [objectKey]
              properties:
                objectKey:
                  type: string
      responses:
        "200":
          description: 짧은 만료 시간의 다운로드 URL
        "401":
          description: 현재 사용자 prefix 밖의 객체 키 요청
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AdventureNoteEntry:
      type: object
      required: [type, title, body, rating, updatedAt]
      description: 사용자가 수첩 기록에 직접 작성한 일기 또는 리뷰다.
      properties:
        type:
          type: string
          enum: [diary, review]
        title:
          type: string
          maxLength: 100
        body:
          type: string
          maxLength: 2000
        rating:
          description: 리뷰 평점이며 일기 또는 아직 작성하지 않은 기록은 null이다.
          anyOf:
            - type: integer
              minimum: 1
              maximum: 5
            - type: "null"
        updatedAt:
          description: 사용자가 기록 내용을 마지막으로 저장한 시각이며 미작성 기록은 null이다.
          anyOf:
            - type: string
              format: date-time
            - type: "null"
    AdventureNote:
      type: object
      required:
        - id
        - reusableQuestId
        - questCompletionId
        - questTitle
        - placeName
        - summary
        - earnedXp
        - photoRef
        - entry
        - badges
        - distanceKm
        - shareImageUrl
        - completedAt
        - createdAt
      properties:
        id:
          type: string
        reusableQuestId:
          type: string
        questCompletionId:
          type: string
        questTitle:
          type: string
        placeName:
          type: string
        summary:
          type: string
          description: 퀘스트 완료 시 시스템이 생성한 활동 요약
        earnedXp:
          type: integer
        photoRef:
          description: 비공개 Object Storage에 저장된 사진의 객체 키이며 사진이 없으면 null이다.
          anyOf:
            - type: string
            - type: "null"
        entry:
          $ref: "#/components/schemas/AdventureNoteEntry"
        badges:
          type: array
          items:
            type: string
        distanceKm:
          type: number
        shareImageUrl:
          description: 시스템 생성 공유 카드 경로이며 아직 생성되지 않았으면 null이다.
          anyOf:
            - type: string
            - type: "null"
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
