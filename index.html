<!doctype html>
<!-- Questbook Daejeon 홈 — 3a "내 꿈돌이 + 도감" 레트로 픽셀 디자인. -->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>모험가의 수첩 | 홈</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
  <link rel="stylesheet" href="assets/css/retro.css" />
</head>
<body data-page="home">
  <div class="app-shell">
    <header class="app-header">
      <span class="app-mark" data-app-icon>✦</span>
      <div class="app-title-group">
        <span class="app-eyebrow" data-app-eyebrow>QUESTBOOK</span>
        <strong class="app-title" data-app-title>모험가 홈</strong>
      </div>
      <span class="level-pill" data-user-level>Lv.3</span>
    </header>

    <main class="app-main">
      <!-- 장착 중인 꿈돌이 히어로 카드 -->
      <section class="gd-hero" data-gd-hero aria-label="내 꿈돌이">
        <span class="gd-hero-img" data-gd-hero-img role="img" aria-label="장착 중인 꿈돌이"></span>
        <div class="gd-hero-body">
          <span class="gd-hero-quote" data-gd-hero-quote>오늘은 어디로 갈까?</span>
          <div class="gd-hero-name-row">
            <h1 class="gd-hero-name" data-gd-hero-name>기본 꿈돌이</h1>
            <span class="gd-equipped-tag">장착중</span>
          </div>
          <p class="gd-hero-meta"><span data-user-name>꼬마 탐험가</span> · <span data-user-summary>퀘스트 7개 · 8.3km</span></p>
          <div class="progress-caption">
            <span>EXP</span>
            <span data-user-progress>64%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" data-user-progress-fill style="width:64%"></div></div>
        </div>
      </section>

      <!-- 꿈돌이 도감: 탭하면 장착, 잠금은 언락 조건 표시 -->
      <section aria-label="꿈돌이 도감">
        <h2 class="section-title">꿈돌이 도감<span class="gd-dex-caption">퀘스트·레벨업으로 언락!</span></h2>
        <div class="gd-dex-grid" data-gd-dex></div>
      </section>

      <section aria-label="주요 화면 이동">
        <h2 class="section-title">탐험 메뉴</h2>
        <div class="quick-grid">
          <a class="feature-card" href="map.html"><span class="card-icon">🗺️</span><strong>지도</strong><span>퀘스트 장소와 추천 관광지를 확인합니다.</span></a>
          <a class="feature-card" href="quests.html"><span class="card-icon">✅</span><strong>퀘스트</strong><span>방문형, 이동형, 소비형 퀘스트를 고릅니다.</span></a>
          <a class="feature-card" href="notes.html"><span class="card-icon">📒</span><strong>수첩</strong><span>완료한 탐험 기록을 모아봅니다.</span></a>
          <a class="feature-card" href="badges.html"><span class="card-icon">🏷️</span><strong>뱃지</strong><span>획득한 스탬프와 잠긴 배지를 봅니다.</span></a>
        </div>
      </section>

      <section class="home-recommend" aria-label="오늘의 추천">
        <h2 class="section-title">오늘의 추천</h2>
        <div class="recommend-card" data-home-recommend></div>
        <p class="data-note">현재 화면은 더미 데이터로 동작합니다. 로그인, GPS, OpenAPI 관광지 DB, 뱃지 시스템은 같은 데이터 경계에 연결하면 됩니다.</p>
      </section>
    </main>

    <nav class="bottom-nav" data-bottom-nav aria-label="주요 화면 이동"></nav>
  </div>

  <script src="assets/js/mock-data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/ggumdori-dex.js"></script>
  <script src="assets/js/scroll-fab.js"></script>
</body>
</html>
