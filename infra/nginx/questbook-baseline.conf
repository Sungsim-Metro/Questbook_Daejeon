# Questbook baseline Nginx 웹 서버 설정 예시다.
server {
    listen 80;
    server_name _;

    root /var/www/questbook/apps/user-web/public;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self)" always;

    location /src/ {
        alias /var/www/questbook/apps/user-web/src/;
        try_files $uri =404;
    }

    location /assets/ {
        alias /var/www/questbook/apps/user-web/public/assets/;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://questbook_app_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

upstream questbook_app_api {
    server 127.0.0.1:8100;
}
